{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<h1 class="mb-4">Record Payment: Invoice #{{ invoice.id }}</h1>

<div class="card mb-4">
    <div class="card-body">
        <p><strong>Patient:</strong> {{ invoice.patient.full_name }}</p>
        <p><strong>Total Amount:</strong> {{ invoice.total_amount }}</p>
        <form method="post" data-spinner="true">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-success"><span data-submit-text><i class="bi bi-check-circle me-1"></i>Record Payment</span><span data-submit-spinner class="d-none"><span class="spinner-border spinner-border-sm me-1"></span>Saving…</span></button>
            <a href="{% url 'invoice_detail' invoice.pk %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
