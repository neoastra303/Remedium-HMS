{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Remedium HMS — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 20%, #e0e7ff 0%, #f8fafc 50%, #f1f5f9 100%);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.10);
        }
        .brand-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-purple));
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 20px rgba(0,98,255,0.3);
            transition: transform 0.3s ease;
        }
        .brand-logo:hover { transform: scale(1.05) rotate(-3deg); }
        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0,98,255,0.12);
        }
        .input-group-text { transition: color 0.2s ease; }
        .input-group:focus-within .input-group-text { color: var(--primary-blue); }
        .login-card { animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-card p-5">
        <div class="text-center mb-4">
            <div class="brand-logo">
                <i class="bi bi-shield-plus text-white fs-4"></i>
            </div>
            <h4 class="fw-bold mb-1 text-gradient">Remedium HMS</h4>
            <p class="text-muted small mb-0">Hospital Management System</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger py-2 small d-flex align-items-center" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span>Invalid username or password. Please try again.</span>
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}" novalidate id="loginForm">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" id="id_username" class="form-control border-start-0 ps-0" placeholder="Enter your username" autocomplete="username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="id_password" class="form-control border-start-0 ps-0" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="input-group-text bg-light border-start-0" onclick="togglePwd()" tabindex="-1" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="pwdToggleIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2.5" id="loginBtn" style="padding:0.75rem 1.5rem;">
                <span id="loginText"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
                <span id="loginSpinner" class="d-none">
                    <span class="spinner-border spinner-border-sm me-2"></span>Signing in…
                </span>
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'password_reset' %}" class="text-muted small text-decoration-none hover-text-primary">
                <i class="bi bi-key me-1"></i>Forgot password?
            </a>
        </div>

        <div class="text-center mt-3">
            <span class="text-muted" style="font-size:0.7rem;">&copy; {% now "Y" %} Remedium HMS</span>
        </div>
    </div>

    <script>
        function togglePwd() {
            var inp = document.getElementById('id_password');
            var icon = document.getElementById('pwdToggleIcon');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                inp.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
        document.getElementById('loginForm').addEventListener('submit', function() {
            document.getElementById('loginText').classList.add('d-none');
            document.getElementById('loginSpinner').classList.remove('d-none');
            document.getElementById('loginBtn').disabled = true;
        });
    </script>
</body>
</html>
