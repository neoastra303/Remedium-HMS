# ---------------------------------------------------------------------------
# Remedium HMS — nginx reverse proxy configuration
#
# TLS/HTTPS NOTE:
#   This config only handles HTTP (port 80). In production you MUST terminate
#   TLS before traffic reaches this server. Options:
#     1. Let nginx handle TLS directly — add a second `server` block listening
#        on port 443 with `ssl_certificate` / `ssl_certificate_key` directives,
#        and redirect port 80 → 443.
#     2. Use an upstream TLS terminator (Cloudflare, AWS ALB, etc.) that sets
#        the X-Forwarded-Proto header. The Django app already trusts this header
#        via SECURE_PROXY_SSL_HEADER in settings_production.py.
#
#   Without TLS, SECURE_SSL_REDIRECT in production settings will cause an
#   infinite redirect loop because Django will keep redirecting HTTP → HTTPS
#   but nginx only serves HTTP.
# ---------------------------------------------------------------------------

upstream remedium_app {
    server web:8000;
}

# Redirect plain HTTP to HTTPS in production.
# Comment out or remove this block if TLS is terminated upstream (e.g. ALB/Cloudflare).
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server — fill in your certificate paths before deploying.
# If TLS is terminated upstream, replace this block with the plain HTTP proxy
# block below and remove the redirect block above.
server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 10M;

    # Replace with real certificate paths (e.g. Let's Encrypt via certbot):
    # ssl_certificate     /etc/letsencrypt/live/your-domain/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://remedium_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
