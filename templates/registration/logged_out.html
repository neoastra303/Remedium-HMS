{% extends "base.html" %}

{% block content %}
<div class="container py-5 text-center">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 400px;">
        <div class="card-body p-5">
            <div class="text-primary fs-1 mb-4">
                <i class="bi bi-door-closed"></i>
            </div>
            <h2 class="mb-3">You've successfully signed out.</h2>
            <p class="text-muted mb-4">Thank you for using Remedium HMS. Have a great day!</p>
            <div class="d-grid">
                <a href="{% url 'login' %}" class="btn btn-primary rounded-pill btn-lg shadow-sm">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Log In Again
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
