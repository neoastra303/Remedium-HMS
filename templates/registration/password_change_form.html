{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm mt-5">
                <div class="card-header bg-white border-0 fw-bold py-3 px-4">
                    <h5 class="mb-0"><i class="bi bi-key me-2 text-primary"></i>Change Password</h5>
                </div>
                <div class="card-body px-4">
                    <form method="post" data-spinner="true">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary rounded-pill">
                                <span data-submit-text="true"><i class="bi bi-check-lg me-1"></i>Change Password</span>
                                <span data-submit-spinner="true" class="d-none"><span class="spinner-border spinner-border-sm me-1"></span>Saving…</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
