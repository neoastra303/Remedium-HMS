{% load static %}
<div class="table-actions">
    <button class="btn-action" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Actions for {{ item_name|default:'item' }}">
        <i class="bi bi-three-dots-vertical"></i>
    </button>
    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
        {% if view_url %}
        <li>
            <a class="dropdown-item d-flex align-items-center" href="{{ view_url }}">
                <i class="bi bi-eye me-2 text-primary"></i> View Details
            </a>
        </li>
        {% endif %}
        {% if edit_url %}
        <li>
            <a class="dropdown-item d-flex align-items-center" href="{{ edit_url }}">
                <i class="bi bi-pencil me-2 text-warning"></i> Edit
            </a>
        </li>
        {% endif %}
        {% if delete_url %}
        <li><hr class="dropdown-divider"></li>
        <li>
            <button class="dropdown-item d-flex align-items-center text-danger"
                    data-bs-toggle="modal"
                    data-bs-target="#confirmDeleteModal"
                    data-action-url="{{ delete_url }}"
                    data-item-name="{{ item_name|default:'this item' }}">
                <i class="bi bi-trash me-2"></i> Delete
            </button>
        </li>
        {% endif %}
    </ul>
</div>
