{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<h1 class="mb-4">Add Working Shift: {{ staff.full_name }}</h1>

<div class="card">
    <div class="card-body">
        <form method="post" data-spinner="true">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary"><span data-submit-text><i class="bi bi-check-circle me-1"></i>Save Shift</span><span data-submit-spinner class="d-none"><span class="spinner-border spinner-border-sm me-1"></span>Saving…</span></button>
            <a href="{% url 'staff_detail' staff.pk %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
