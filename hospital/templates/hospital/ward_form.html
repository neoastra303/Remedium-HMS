{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 py-3 px-4"><h5 class="fw-bold mb-0"><i class="bi bi-building me-2 text-primary"></i>{% if object %}Edit Ward{% else %}New Ward{% endif %}</h5></div>
        <div class="card-body p-4">
            <form method="post" novalidate data-spinner="true">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'hospital:ward_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary px-4"><span data-submit-text><i class="bi bi-check-circle me-1"></i>{% if object %}Update{% else %}Create{% endif %} Ward</span><span data-submit-spinner class="d-none"><span class="spinner-border spinner-border-sm me-1"></span>Saving…</span></button>
                </div>
            </form>
        </div>
    </div>
</div></div>
{% endblock %}
