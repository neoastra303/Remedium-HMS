<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Remedium HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/custom.css">
    <style>
        body { background: var(--bg-clinical); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid var(--glass-border); 
            border-radius: var(--radius-xl); 
            padding: 40px; 
            width: 100%; max-width: 400px;
            box-shadow: var(--shadow-elevated);
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="remedium-logo justify-content-center mb-4">
            <div class="logo-icon"><i class="bi bi-plus-lg"></i></div>
            Remedium
        </div>
        <h4 class="fw-bold mb-4">Welcome Back</h4>
        <form>
            <input type="text" class="form-control mb-3 rounded-pill" placeholder="Username">
            <input type="password" class="form-control mb-4 rounded-pill" placeholder="Password">
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold">SIGN IN</button>
        </form>
    </div>
</body>
</html>
