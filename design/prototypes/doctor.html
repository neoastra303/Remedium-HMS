<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - Remedium HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../static/css/custom.css">
    <style>
        body { background: var(--bg-clinical); }
        .sidebar { height: 100vh; background: white; border-right: 1px solid var(--glass-border); padding: 20px; }
        .nav-link { color: #64748b; border-radius: 12px; margin-bottom: 5px; }
        .nav-link.active { background: #2563eb; color: white; }
        .main-content { padding: 30px; }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 16px; padding: 20px; height: 100%; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="remedium-logo mb-5">
            <div class="logo-icon"><i class="bi bi-plus-lg"></i></div>
            Remedium
        </div>
        <div class="nav flex-column">
            <a href="#" class="nav-link active"><i class="bi bi-grid me-2"></i> Doctor Portal</a>
        </div>
    </div>
    <div class="main-content flex-grow-1">
        <h3 class="fw-bold mb-4">Doctor Dashboard</h3>
        <div class="row g-4">
            <div class="col-md-6"><div class="glass-card"><h5>Today's Schedule</h5><p>• 09:00 - John Doe (Consult)</p><p>• 10:30 - Jane Smith (Follow-up)</p></div></div>
            <div class="col-md-6"><div class="glass-card"><h5>Critical Vitals</h5><p class="text-danger">• Bed 101: BP 150/95</p><p class="text-warning">• Bed 105: SpO2 92%</p></div></div>
        </div>
    </div>
</div>
</body>
</html>
