        cost_per_unit:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          description: Cost per unit
        supplier:
          type: string
          nullable: true
          description: Supplier name
          maxLength: 100
        expiry_date:
          type: string
          format: date
          nullable: true
