{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-door-open me-2 text-primary"></i>Room {{ room.room_number }}</h4>
    <div class="d-flex gap-2">
        <a href="{% url 'hospital:room_update' room.pk %}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil me-1"></i>Edit</a>
        <a href="{% url 'hospital:room_delete' room.pk %}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash me-1"></i>Delete</a>
    </div>
</div>
<div class="card border-0 shadow-sm">
    <div class="card-body px-4">
        <dl class="row mb-0">
            <dt class="col-4 text-muted small">Ward</dt><dd class="col-8"><a href="{% url 'hospital:ward_detail' room.ward.pk %}">{{ room.ward.name }}</a></dd>
            <dt class="col-4 text-muted small">Room Number</dt><dd class="col-8">{{ room.room_number }}</dd>
            <dt class="col-4 text-muted small">Capacity</dt><dd class="col-8">{{ room.capacity }} beds</dd>
        </dl>
    </div>
</div>
<div class="mt-3"><a href="{% url 'hospital:room_list' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
{% endblock %}
