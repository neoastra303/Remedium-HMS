components:
  schemas:
    Appointment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        patient:
          type: integer
        patient_detail:
          allOf:
          - $ref: '#/components/schemas/PatientFull'
          readOnly: true
        doctor:
          type: integer
        doctor_detail:
          allOf:
          - $ref: '#/components/schemas/Staff'
          readOnly: true
        appointment_date:
          type: string
          format: date-time
        reason:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/StatusEnum'
      required:
      - appointment_date
      - doctor
      - doctor_detail
      - id
      - patient
      - patient_detail
    AppointmentRequest:
      type: object
      properties:
        patient:
          type: integer
        doctor:
          type: integer
        appointment_date:
          type: string
          format: date-time
        reason:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/StatusEnum'
      required:
      - appointment_date
      - doctor
      - patient
    BlankEnum:
      enum:
      - ''
    CategoryEnum:
      enum:
      - MEDICAL_SUPPLIES
      - PHARMACEUTICALS
      - EQUIPMENT
      - CONSUMABLES
      - SURGICAL_INSTRUMENTS
      - LABORATORY
      - OFFICE_SUPPLIES
      - MAINTENANCE
      - PPE
      - OTHER
      type: string
      description: |-
        * `MEDICAL_SUPPLIES` - Medical Supplies
        * `PHARMACEUTICALS` - Pharmaceuticals
        * `EQUIPMENT` - Medical Equipment
        * `CONSUMABLES` - Consumables
        * `SURGICAL_INSTRUMENTS` - Surgical Instruments
        * `LABORATORY` - Laboratory Supplies
        * `OFFICE_SUPPLIES` - Office Supplies
        * `MAINTENANCE` - Maintenance Supplies
        * `PPE` - Personal Protective Equipment
        * `OTHER` - Other
    DepartmentEnum:
      enum:
      - EMERGENCY
      - CARDIOLOGY
      - NEUROLOGY
      - ORTHOPEDICS
      - PEDIATRICS
      - SURGERY
      - ICU
      - ONCOLOGY
      - RADIOLOGY
      - LABORATORY
      - PHARMACY
      - ADMINISTRATION
      - MAINTENANCE
      - SECURITY
      - OTHER
      type: string
      description: |-
        * `EMERGENCY` - Emergency Department
        * `CARDIOLOGY` - Cardiology
        * `NEUROLOGY` - Neurology
        * `ORTHOPEDICS` - Orthopedics
        * `PEDIATRICS` - Pediatrics
        * `SURGERY` - Surgery
        * `ICU` - Intensive Care Unit
        * `ONCOLOGY` - Oncology
        * `RADIOLOGY` - Radiology
        * `LABORATORY` - Laboratory
        * `PHARMACY` - Pharmacy
        * `ADMINISTRATION` - Administration
        * `MAINTENANCE` - Maintenance
        * `SECURITY` - Security
        * `OTHER` - Other
    ExternalIntegration:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        is_deleted:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          nullable: true
        system_name:
          type: string
          maxLength: 100
        system_type:
          $ref: '#/components/schemas/SystemTypeEnum'
        api_endpoint:
          type: string
          format: uri
          maxLength: 200
        last_sync:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          maxLength: 50
        last_sync_result:
          nullable: true
        notes:
          type: string
          nullable: true
      required:
      - api_endpoint
      - created_at
      - id
      - system_name
      - updated_at
    ExternalIntegrationRequest:
      type: object
      properties:
        is_deleted:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          nullable: true
        system_name:
          type: string
          minLength: 1
          maxLength: 100
        system_type:
          $ref: '#/components/schemas/SystemTypeEnum'
        api_endpoint:
          type: string
          format: uri
          minLength: 1
          maxLength: 200
        api_key:
          type: string
          writeOnly: true
          nullable: true
          description: Encrypted API Key (use set_api_key/get_api_key methods)
          maxLength: 512
        last_sync:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          minLength: 1
          maxLength: 50
        last_sync_result:
          nullable: true
        notes:
          type: string
          nullable: true
      required:
      - api_endpoint
      - system_name
    InventoryItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the inventory item
          maxLength: 100
        category:
          allOf:
          - $ref: '#/components/schemas/CategoryEnum'
          description: |-
            Category of the inventory item

            * `MEDICAL_SUPPLIES` - Medical Supplies
            * `PHARMACEUTICALS` - Pharmaceuticals
            * `EQUIPMENT` - Medical Equipment
            * `CONSUMABLES` - Consumables
            * `SURGICAL_INSTRUMENTS` - Surgical Instruments
            * `LABORATORY` - Laboratory Supplies
            * `OFFICE_SUPPLIES` - Office Supplies
            * `MAINTENANCE` - Maintenance Supplies
            * `PPE` - Personal Protective Equipment
            * `OTHER` - Other
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Current quantity in stock
        unit:
          allOf:
          - $ref: '#/components/schemas/UnitEnum'
          description: |-
            Unit of measurement

            * `PIECE` - Piece
            * `BOX` - Box
            * `PACK` - Pack
            * `BOTTLE` - Bottle
            * `VIAL` - Vial
            * `TUBE` - Tube
            * `KG` - Kilogram
            * `GRAM` - Gram
            * `LITER` - Liter
            * `ML` - Milliliter
            * `SET` - Set
            * `OTHER` - Other
        reorder_level:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: Minimum quantity before reordering
        cost_per_unit:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          description: Cost per unit
        supplier:
          type: string
          nullable: true
          description: Supplier name
          maxLength: 100
        expiry_date:
          type: string
          format: date
          nullable: true
          description: Expiry date for perishable items
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        needs_reorder:
          type: boolean
          readOnly: true
        is_expired:
          type: boolean
          readOnly: true
        total_value:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - category
      - created_at
      - id
      - is_expired
      - name
      - needs_reorder
      - quantity
      - total_value
      - unit
      - updated_at
    InventoryItemRequest:
