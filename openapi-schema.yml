components:
  schemas:
    Appointment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        patient:
          type: integer
        patient_detail:
          allOf:
          - $ref: '#/components/schemas/PatientFull'
          readOnly: true
        doctor:
          type: integer
        doctor_detail:
          allOf:
          - $ref: '#/components/schemas/Staff'
          readOnly: true
        appointment_date:
          type: string
          format: date-time
        reason:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/AppointmentStatusEnum'
      required:
      - appointment_date
      - doctor
      - doctor_detail
      - id
      - patient
      - patient_detail
    AppointmentRequest:
      type: object
      properties:
        patient:
          type: integer
        doctor:
          type: integer
        appointment_date:
          type: string
          format: date-time
        reason:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/AppointmentStatusEnum'
      required:
      - appointment_date
      - doctor
      - patient
    AppointmentStatusEnum:
      enum:
      - Scheduled
      - Completed
      - Cancelled
      type: string
      description: |-
        * `Scheduled` - Scheduled
        * `Completed` - Completed
        * `Cancelled` - Cancelled
    AuthToken:
      type: object
      properties:
        token:
          type: string
          readOnly: true
      required:
      - token
    AuthTokenRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    BlankEnum:
      enum:
      - ''
    DepartmentEnum:
      enum:
      - EMERGENCY
      - CARDIOLOGY
      - NEUROLOGY
      - ORTHOPEDICS
      - PEDIATRICS
      - SURGERY
      - ICU
      - ONCOLOGY
      - RADIOLOGY
      - LABORATORY
      - PHARMACY
      - ADMINISTRATION
      - MAINTENANCE
      - SECURITY
      - OTHER
      type: string
      description: |-
        * `EMERGENCY` - Emergency Department
        * `CARDIOLOGY` - Cardiology
        * `NEUROLOGY` - Neurology
        * `ORTHOPEDICS` - Orthopedics
        * `PEDIATRICS` - Pediatrics
        * `SURGERY` - Surgery
        * `ICU` - Intensive Care Unit
        * `ONCOLOGY` - Oncology
        * `RADIOLOGY` - Radiology
        * `LABORATORY` - Laboratory
        * `PHARMACY` - Pharmacy
        * `ADMINISTRATION` - Administration
        * `MAINTENANCE` - Maintenance
        * `SECURITY` - Security
        * `OTHER` - Other
    ExternalIntegration:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        system_name:
          type: string
          maxLength: 100
        system_type:
          $ref: '#/components/schemas/SystemTypeEnum'
        api_endpoint:
          type: string
          format: uri
          maxLength: 200
        last_sync:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          maxLength: 50
        last_sync_result:
          nullable: true
        notes:
          type: string
          nullable: true
      required:
      - api_endpoint
      - id
      - system_name
    ExternalIntegrationRequest:
      type: object
      properties:
        system_name:
          type: string
          minLength: 1
          maxLength: 100
        system_type:
          $ref: '#/components/schemas/SystemTypeEnum'
        api_endpoint:
          type: string
          format: uri
          minLength: 1
          maxLength: 200
        api_key:
          type: string
          writeOnly: true
          nullable: true
          description: Encrypted API Key (use set_api_key/get_api_key methods)
          maxLength: 512
        last_sync:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          minLength: 1
          maxLength: 50
        last_sync_result:
          nullable: true
        notes:
          type: string
          nullable: true
      required:
      - api_endpoint
      - system_name
    Invoice:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        patient:
          type: integer
        patient_detail:
          allOf:
          - $ref: '#/components/schemas/PatientFull'
          readOnly: true
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        paid:
          type: boolean
        insurance_claimed:
          type: boolean
        details:
          type: string
          nullable: true
      required:
      - id
      - patient
      - patient_detail
      - total_amount
    InvoiceRequest:
      type: object
      properties:
        patient:
          type: integer
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        total_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        paid:
          type: boolean
        insurance_claimed:
          type: boolean
        details:
          type: string
          nullable: true
      required:
      - patient
      - total_amount
    LabTest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        test_name:
          type: string
          maxLength: 100
        requested_date:
          type: string
          format: date-time
          readOnly: true
        result_date:
          type: string
          format: date-time
          nullable: true
        result:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/LabTestStatusEnum'
        patient:
          type: integer
      required:
      - id
      - patient
      - requested_date
      - test_name
    LabTestRequest:
