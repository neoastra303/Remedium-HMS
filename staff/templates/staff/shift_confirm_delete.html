{% extends 'base.html' %}

{% block content %}
<h2>Confirm Delete Shift</h2>
<p>Are you sure you want to delete the shift for {{ object.staff.full_name }} on {{ object.get_day_of_week_display }}?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirm Delete</button>
    <a href="{% url 'staff_detail' object.staff.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
