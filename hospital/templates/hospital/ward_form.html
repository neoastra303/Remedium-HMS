{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 py-3 px-4"><h5 class="fw-bold mb-0"><i class="bi bi-building me-2 text-primary"></i>{% if object %}Edit Ward{% else %}New Ward{% endif %}</h5></div>
        <div class="card-body p-4"><form method="post" novalidate>{% csrf_token %}{% crispy form %}</form></div>
    </div>
</div></div>
{% endblock %}
