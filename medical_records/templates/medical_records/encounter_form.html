{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 py-3 px-4">
                <h5 class="fw-bold mb-0">
                    <i class="bi bi-person-workspace me-2 text-primary"></i>Start Clinical Encounter
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% if request.GET.patient %}{% url 'patient_detail' request.GET.patient %}{% else %}{% url 'patient_list' %}{% endif %}" class="btn btn-light px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Create Encounter</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
