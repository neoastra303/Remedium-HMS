{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="bi bi-door-open me-2 text-primary"></i>Rooms</h4>
    <a href="{% url 'hospital:room_create' %}" class="btn btn-sm btn-primary"><i class="bi bi-plus-circle me-1"></i>New Room</a>
</div>
<div class="card border-0 shadow-sm">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light"><tr><th class="ps-4">Room #</th><th>Ward</th><th>Capacity</th><th class="pe-4 text-end">Actions</th></tr></thead>
            <tbody>
                {% for room in rooms %}
                <tr>
                    <td class="ps-4 fw-medium">{{ room.room_number }}</td>
                    <td>{{ room.ward.name }}</td>
                    <td>{{ room.capacity }}</td>
                    <td class="pe-4 text-end">
                        <a href="{% url 'hospital:room_detail' room.pk %}" class="btn btn-sm btn-outline-primary" title="View" aria-label="View"><i class="bi bi-eye"></i></a>
                        <a href="{% url 'hospital:room_update' room.pk %}" class="btn btn-sm btn-outline-warning" title="Edit" aria-label="Edit"><i class="bi bi-pencil"></i></a>
                        <button type="button" class="btn btn-sm btn-outline-danger" title="Delete" aria-label="Delete"
                            data-bs-toggle="modal" data-bs-target="#confirmDeleteModal"
                            data-action-url="{% url 'hospital:room_delete' room.pk %}"
                            data-item-name="Room {{ room.room_number }}"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
                {% empty %}<tr><td colspan="4" class="text-center py-4 text-muted">No rooms found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% include 'partials/pagination.html' %}
{% endblock %}
