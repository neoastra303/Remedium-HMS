<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Remedium HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../static/css/custom.css">
    <style>
        body { background: var(--bg-clinical); }
        .sidebar { height: 100vh; background: white; border-right: 1px solid var(--glass-border); padding: 20px; }
        .nav-link { color: #64748b; border-radius: var(--radius-btn); margin-bottom: 5px; }
        .nav-link.active { background: var(--primary-blue); color: white; }
        .main-content { padding: 30px; }
        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border); 
            border-radius: var(--radius-card); 
            padding: 20px;
            box-shadow: var(--shadow-card);
            height: 100%;
        }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <div class="remedium-logo mb-5">
            <div class="logo-icon"><i class="bi bi-plus-lg"></i></div>
            Remedium
        </div>
        <div class="nav flex-column">
            <a href="#" class="nav-link active"><i class="bi bi-grid me-2"></i> Dashboard</a>
            <a href="#" class="nav-link"><i class="bi bi-people me-2"></i> Patients</a>
            <a href="#" class="nav-link"><i class="bi bi-calendar-event me-2"></i> Appointments</a>
        </div>
    </div>
    <div class="main-content flex-grow-1">
        <h3 class="fw-bold mb-4">{{dashboard_title}}</h3>
        <div class="row g-4">
            {{dashboard_content}}
        </div>
    </div>
</div>
</body>
</html>
