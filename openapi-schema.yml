openapi: 3.0.3
info:
  title: Remedium Hospital Management System API
  version: 1.0.0
  description: "\nComprehensive REST API for the Remedium Hospital Management System.\n\
    \n## Authentication\nAll API endpoints require authentication. Obtain a token\
    \ via `/api-token-auth/` and include it in requests:\n```\nAuthorization: Token\
    \ <your-token>\n```\n\n## Versioning\nAll API endpoints are versioned under `/api/v1/`.\n\
    \n## Rate Limiting\n- Anonymous users: 100 requests/hour\n- Authenticated users:\
    \ 1000 requests/hour\n- Login attempts: 20/hour\n\n## Resources\n- **Patients**\
    \ - Patient demographics and medical records\n- **Staff** - Staff directory and\
    \ user management\n- **Appointments** - Appointment scheduling and management\n\
    - **Invoices** - Billing and payment tracking\n- **Lab Tests** - Laboratory test\
    \ management\n- **Prescriptions** - Pharmacy and prescription management\n- **Integrations**\
    \ - External system integrations (Admin only)\n    "
  contact:
    name: Remedium HMS Support
    email: support@remediumhms.com
  license:
    name: MIT License
