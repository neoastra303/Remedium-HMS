<div class="mb-0">
    <label for="{{ field.id_for_label }}" class="form-label">{{ label }}</label>
    {{ field }}
    {% if field.errors %}
    <div class="text-danger small mt-1 d-flex align-items-center gap-1">
        <i class="bi bi-exclamation-circle"></i>
        <span>{{ field.errors.0 }}</span>
    </div>
    {% endif %}
    {% if field.help_text %}
    <div class="text-muted small mt-1">{{ field.help_text }}</div>
    {% endif %}
</div>
