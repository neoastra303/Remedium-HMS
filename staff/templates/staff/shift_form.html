{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<h1 class="mb-4">Add Working Shift: {{ staff.full_name }}</h1>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary">Save Shift</button>
            <a href="{% url 'staff_detail' staff.pk %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
