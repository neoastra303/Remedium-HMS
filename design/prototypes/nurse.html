<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurse Dashboard - Remedium HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../static/css/custom.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
        <div class="remedium-logo">
            <div class="logo-icon"><i class="bi bi-plus-lg"></i></div>
            Remedium
        </div>
        <div class="d-flex w-50">
            <input type="text" class="form-control rounded-pill bg-light border-0" placeholder="Global search (Ctrl+K)...">
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="dropdown"><i class="bi bi-bell fs-5 cursor-pointer" data-bs-toggle="dropdown"></i></div>
            <div class="dropdown"><div class="rounded-circle bg-primary text-white p-2 cursor-pointer" data-bs-toggle="dropdown">UN</div></div>
        </div>
    </div>
</nav>
<div class="d-flex">
    <div class="sidebar" style="width: 240px;">
        <nav class="nav flex-column">
            <a href="nurse.html" class="nav-link active"><i class="bi bi-heart-pulse me-2"></i> Ward Tracker</a>
        </nav>
    </div>
    <div class="main-content flex-grow-1">
        <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="#">Home</a></li><li class="breadcrumb-item active">Ward Tracker</li></ol></nav>
        <div class="d-flex justify-content-between mb-4">
            <h3 class="fw-bold">Ward Management - Ward A</h3>
            <button class="btn btn-success rounded-pill">+ New Vitals Check</button>
        </div>
        <div class="row g-4">
            <div class="col-md-8">
                <div class="glass-card">
                    <h5>Bed Occupancy Map</h5>
                    <div class="d-flex gap-3 mt-3">
                        <div class="p-3 border rounded-3 text-center border-danger">Bed 101<br>John D.<br><span class="badge bg-danger">Urgent</span></div>
                        <div class="p-3 border rounded-3 text-center">Bed 102<br>EMPTY</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card">
                    <h5>Medication Queue</h5>
                    <ul class="list-unstyled">
                        <li>• Insulin (John D.) <button class="btn btn-outline-success btn-sm ms-2">Done</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
